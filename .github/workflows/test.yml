name: test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -count=1 ./...
      - run: go test -count=1 -race ./...
      - run: go vet ./...
